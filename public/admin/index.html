<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE STORE — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1115;--surface:#1a1d24;--surface-2:#22262e;--border:#2a2e37;--border-hover:#3a3e47;--text:#e8eaed;--text-muted:#8b8f98;--accent:#7c3aed;--accent-hover:#6d28d9;--accent-light:rgba(124,58,237,0.15);--danger:#ef4444;--danger-hover:#dc2626;--success:#22c55e;--success-light:rgba(34,197,94,0.15);--warning:#f59e0b;--radius:10px;--radius-sm:6px;--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:380px;text-align:center}
.login-card h1{font-size:28px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.login-card p{color:var(--text-muted);font-size:14px;margin-bottom:24px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-input{width:100%;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text-muted)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger-light);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border-hover);color:var(--text)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:0.9}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 12px;font-size:12px}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:var(--accent-light);color:var(--accent);padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.header-right{display:flex;gap:8px}

.main{max-width:900px;margin:0 auto;padding:24px}
.error-text{color:var(--danger);font-size:13px;margin-top:8px;display:none}

.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.toolbar .btn{flex-shrink:0}

.product-grid{display:grid;gap:12px}
.product-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:16px;align-items:flex-start;transition:border-color 0.2s}
.product-item:hover{border-color:var(--border-hover)}
.product-img{width:80px;height:80px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-name{font-weight:700;font-size:15px;margin-bottom:4px}
.product-meta{font-size:13px;color:var(--text-muted)}
.product-actions{display:flex;gap:6px;flex-shrink:0}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.checkbox-label{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all 0.2s}
.checkbox-label:has(input:checked){border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.checkbox-label input{display:none}

.topdrop-tag{background:var(--accent-light);color:var(--accent);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:8px}

.toast-box{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease;min-width:200px}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}
.toast.warning{background:var(--warning);color:#000}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty svg{margin-bottom:16px;opacity:0.3}

@media(max-width:640px){
  .form-row{grid-template-columns:1fr}
  .product-item{flex-direction:column}
  .product-img{width:100%;height:160px}
  .toolbar{flex-direction:column}
  .toolbar .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>

<div class="toast-box" id="toastBox"></div>

<!-- Login -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <h1>VIBE STORE</h1>
    <p>Увійдіть до адмін-панелі</p>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" class="form-input" id="loginPw" placeholder="Введіть пароль" autocomplete="off">
    </div>
    <div class="error-text" id="loginErr"></div>
    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<!-- Admin -->
<div id="adminPage" style="display:none">
  <header class="header">
    <div class="header-left">
      <span class="logo">VIBE STORE</span>
      <span class="badge">ADMIN</span>
    </div>
    <div class="header-right">
      <a href="/" class="btn btn-ghost btn-sm">На сайт</a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Вийти</button>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAdd()">+ Додати товар</button>
      <button class="btn btn-success" onclick="saveAll()" id="saveBtn">Зберегти все</button>
      <span style="flex:1"></span>
      <span style="font-size:13px;color:var(--text-muted);align-self:center" id="countLabel"></span>
    </div>
    <div class="product-grid" id="productList"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Новий товар</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label>Назва</label><input class="form-input" id="fName" placeholder="Назва товару"></div>
      <div class="form-row">
        <div class="form-group"><label>Ціна</label><input class="form-input" id="fPrice" placeholder="3 200"></div>
        <div class="form-group"><label>Категорія</label>
          <select class="form-input" id="fCategory">
            <option>Кросівки</option><option>Худі та світшоти</option><option>Футболки</option><option>Штани та джинси</option><option>Шкарпетки</option><option>Аксесуари</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Опис</label><input class="form-input" id="fDesc" placeholder="Опис товару"></div>
      <div class="form-group"><label>Посилання на фото (URL)</label><input class="form-input" id="fImage" placeholder="https://..."></div>
      <div class="form-group"><label>Розміри</label><div class="checkbox-group" id="fSizes"></div></div>
      <div class="form-group"><label><input type="checkbox" id="fTopDrop" style="margin-right:6px">TOP DROP</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveProduct()" id="saveProductBtn">Зберегти</button>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'vibe123store'
const API = '/api/products'

const SIZES = {
  'Кросівки': ['37','38','39','40','41','42','43','44','45'],
  'Худі та світшоти': ['S','M','L','XL'],
  'Футболки': ['S','M','L','XL'],
  'Штани та джинси': ['S','M','L','XL'],
  'Шкарпетки': ['S','M','L','XL'],
  'Аксесуари': ['S','M','L','XL']
}

let products = []

function toast(msg, type='success') {
  const t = document.createElement('div')
  t.className = 'toast ' + type
  t.textContent = msg
  document.getElementById('toastBox').appendChild(t)
  setTimeout(() => t.remove(), 3000)
}

async function doLogin() {
  const pw = document.getElementById('loginPw').value.trim()
  if (!pw) return
  if (pw !== PASSWORD) {
    document.getElementById('loginErr').textContent = 'Невірний пароль'
    document.getElementById('loginErr').style.display = 'block'
    return
  }
  document.getElementById('loginPage').style.display = 'none'
  document.getElementById('adminPage').style.display = 'block'
  await loadProducts()
}

document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

function doLogout() {
  document.getElementById('adminPage').style.display = 'none'
  document.getElementById('loginPage').style.display = 'flex'
  document.getElementById('loginPw').value = ''
}

async function loadProducts() {
  try {
    const res = await fetch(API)
    if (res.ok) {
      const data = await res.json()
      if (Array.isArray(data) && data.length > 0) products = data
    }
  } catch {}
  render()
}

function render() {
  const list = document.getElementById('productList')
  document.getElementById('countLabel').textContent = products.length + ' товарів'
  if (!products.length) {
    list.innerHTML = '<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><p>Немає товарів. Додайте перший!</p></div>'
    return
  }
  list.innerHTML = products.map(p => `
    <div class="product-item">
      <img class="product-img" src="${p.images?.[0] || ''}" alt="" onerror="this.style.display='none'">
      <div class="product-info">
        <div class="product-name">${esc(p.name)}${p.topDrop ? '<span class="topdrop-tag">TOP DROP</span>' : ''}</div>
        <div class="product-meta">${esc(p.price)} ₴ · ${esc(p.category)} · ${p.sizes?.join(', ') || ''}</div>
        <div class="product-meta" style="margin-top:2px">${esc(p.desc || '')}</div>
      </div>
      <div class="product-actions">
        <button class="btn btn-ghost btn-sm" onclick="editProduct(${p.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑</button>
      </div>
    </div>
  `).join('')
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Новий товар'
  document.getElementById('editId').value = ''
  document.getElementById('fName').value = ''
  document.getElementById('fPrice').value = ''
  document.getElementById('fDesc').value = ''
  document.getElementById('fImage').value = ''
  document.getElementById('fCategory').value = 'Кросівки'
  document.getElementById('fTopDrop').checked = false
  renderSizes('Кросівки', [])
  document.getElementById('fCategory').onchange = function() { renderSizes(this.value, []) }
  document.getElementById('modal').classList.add('open')
}

function editProduct(id) {
  const p = products.find(x => x.id === id)
  if (!p) return
  document.getElementById('modalTitle').textContent = 'Редагувати товар'
  document.getElementById('editId').value = id
  document.getElementById('fName').value = p.name
  document.getElementById('fPrice').value = p.price
  document.getElementById('fDesc').value = p.desc || ''
  document.getElementById('fImage').value = p.images?.[0] || ''
  document.getElementById('fCategory').value = p.category
  document.getElementById('fTopDrop').checked = !!p.topDrop
  renderSizes(p.category, p.sizes || [])
  document.getElementById('fCategory').onchange = function() { renderSizes(this.value, []) }
  document.getElementById('modal').classList.add('open')
}

function renderSizes(category, selected) {
  const sizes = SIZES[category] || SIZES['Кросівки']
  document.getElementById('fSizes').innerHTML = sizes.map(s =>
    `<label class="checkbox-label"><input type="checkbox" value="${s}" ${selected.includes(s)?'checked':''}>${s}</label>`
  ).join('')
}

function closeModal() { document.getElementById('modal').classList.remove('open') }

function saveProduct() {
  const id = document.getElementById('editId').value
  const name = document.getElementById('fName').value.trim()
  const price = document.getElementById('fPrice').value.trim()
  const desc = document.getElementById('fDesc').value.trim()
  const image = document.getElementById('fImage').value.trim()
  const category = document.getElementById('fCategory').value
  const topDrop = document.getElementById('fTopDrop').checked
  const sizes = [...document.querySelectorAll('#fSizes input:checked')].map(c => c.value)

  if (!name) { toast('Введіть назву', 'warning'); return }
  if (!price) { toast('Введіть ціну', 'warning'); return }

  const imgArr = image ? [image] : []

  if (id) {
    const idx = products.findIndex(x => x.id === Number(id))
    if (idx >= 0) {
      products[idx] = { ...products[idx], name, price, desc, sizes, category, topDrop, images: imgArr.length ? imgArr : products[idx].images }
    }
  } else {
    const newId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 1
    products.push({ id: newId, name, price, desc, sizes, category, topDrop, images: imgArr.length ? imgArr : ['https://via.placeholder.com/300'], currentImageIndex: 0 })
  }

  closeModal()
  render()
  toast(id ? 'Товар оновлено' : 'Товар додано')
}

function deleteProduct(id) {
  if (!confirm('Видалити цей товар?')) return
  products = products.filter(p => p.id !== id)
  render()
  toast('Товар видалено', 'warning')
}

async function saveAll() {
  const btn = document.getElementById('saveBtn')
  btn.innerHTML = '<div class="spinner"></div> Збереження...'
  btn.disabled = true
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ products })
    })
    if (!res.ok) throw new Error('Помилка сервера')
    toast('Збережено! Товари оновлені на сайті.')
  } catch (e) {
    toast('Помилка: ' + e.message, 'error')
  } finally {
    btn.innerHTML = 'Зберегти все'
    btn.disabled = false
  }
}
</script>
</body>
</html>
